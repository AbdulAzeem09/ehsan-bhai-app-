				<div class="col-md-6 col-12 offset-md-3 my-5" >					
					<div class="d-flex flex-column">						
						<a href="#" class="btn btn-block btn-social btn-facebook mb-3">
							<span class="fa fa-facebook"></span> Invite Facebook Friends

						<a href="#" class="btn btn-block btn-social btn-twitter mb-3">
